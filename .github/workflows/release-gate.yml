name: Release Gate

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # nightly at 3 AM UTC

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Install SwarmAI framework
        run: |
          git clone --depth 1 https://${{ secrets.GH_TOKEN || github.token }}@github.com/IntelliSwarm-ai/swarm-ai.git /tmp/swarm-ai
          cd /tmp/swarm-ai
          chmod +x mvnw
          ./mvnw clean install -DskipTests -B -q

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw clean test -B -q

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  static-analysis:
    name: Static Analysis (SpotBugs + Enforcer + OWASP)
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Install SwarmAI framework
        run: |
          git clone --depth 1 https://${{ secrets.GH_TOKEN || github.token }}@github.com/IntelliSwarm-ai/swarm-ai.git /tmp/swarm-ai
          cd /tmp/swarm-ai
          chmod +x mvnw
          ./mvnw clean install -DskipTests -B -q

      - name: Run static analysis
        run: |
          chmod +x mvnw
          ./mvnw verify -Prelease-gate -DskipTests -B

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugs*.xml
          retention-days: 7

  coverage:
    name: Code Coverage
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Install SwarmAI framework
        run: |
          git clone --depth 1 https://${{ secrets.GH_TOKEN || github.token }}@github.com/IntelliSwarm-ai/swarm-ai.git /tmp/swarm-ai
          cd /tmp/swarm-ai
          chmod +x mvnw
          ./mvnw clean install -DskipTests -B -q

      - name: Run tests with coverage
        run: |
          chmod +x mvnw
          ./mvnw clean verify -Prelease-gate -B

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  cross-jdk:
    name: Cross-JDK (Java ${{ matrix.java }})
    needs: unit-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 21, 22, 23 ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Install SwarmAI framework
        run: |
          git clone --depth 1 https://${{ secrets.GH_TOKEN || github.token }}@github.com/IntelliSwarm-ai/swarm-ai.git /tmp/swarm-ai
          cd /tmp/swarm-ai
          chmod +x mvnw
          ./mvnw clean install -DskipTests -B -q

      - name: Run tests on JDK ${{ matrix.java }}
        run: |
          chmod +x mvnw
          ./mvnw clean test -B -q

  release-summary:
    name: Release Gate Summary
    needs: [ unit-tests, static-analysis, coverage, cross-jdk ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check gate results
        run: |
          echo "## Release Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cross-JDK | ${{ needs.cross-jdk.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.static-analysis.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ] || \
             [ "${{ needs.cross-jdk.result }}" != "success" ]; then
            echo ""
            echo "One or more gates failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo ""
          echo "All gates passed" >> $GITHUB_STEP_SUMMARY
