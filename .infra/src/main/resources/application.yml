spring:
  profiles:
    # Default to OpenAI gpt-4o — stronger at evidence-grounded extraction and less
    # prone to "DATA NOT AVAILABLE" shortcuts than o3-mini on this workload.
    # Override with --spring.profiles.active=openai-o3 for the o3-mini reasoning model
    # (cheaper, but more laziness on data-extraction tasks) or --spring.profiles.active=ollama
    # for local-dev without API keys.
    active: ${SPRING_PROFILES_ACTIVE:openai}
  # Profile-specific config lives in application-<profile>.yml.
  # Default profile is openai (gpt-4o). See spring.profiles.active above.
  # Switch to openai-o3 for the o3-mini reasoning model, or ollama for local-dev-without-API-keys.
  autoconfigure:
    exclude:
      # Vector store + JDBC autoconfigs are always excluded (examples don't use them by default)
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
  ai:
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}
        collection-name: ${CHROMA_COLLECTION:swarmai-rag}
        initialize-schema: true

# =============================================================================
# Bridge from .env-style env vars → Spring property names used by framework tools.
#
# Tool classes (e.g. WebSearchTool) use @Value("${stock.search.alphavantage.api-key}")
# but users typically put keys in .env as ALPHA_VANTAGE_API_KEY=...
# These mappings let .env drive the tools without users editing property files.
# Both .env loading (via ParentDirDotenvPostProcessor) and direct env vars work.
# =============================================================================
stock:
  search:
    alphavantage:
      api-key: ${ALPHA_VANTAGE_API_KEY:demo}
    newsapi:
      api-key: ${NEWSAPI_KEY:}
    polygon:
      api-key: ${POLYGON_API_KEY:}
    finnhub:
      api-key: ${FINNHUB_API_KEY:}
    google:
      api-key: ${GOOGLE_API_KEY:}
      search-engine-id: ${GOOGLE_SEARCH_ENGINE_ID:}
    bing:
      api-key: ${BING_API_KEY:}

server:
  # Use a random free port when the Spring Boot web server is started. Prevents
  # "Port 8080 was already in use" when an earlier example still holds 8080 open
  # (e.g. when studio-keep-alive=true). The actual port is printed in the startup log.
  # Override with `--server.port=8080` for a stable Studio URL.
  port: ${SERVER_PORT:0}

swarmai:
  studio:
    enabled: true  # Must be true — StudioController is always component-scanned and needs its beans.
                   # The CLI/Docker exit behavior is controlled by swarmai.studio.keep-alive below.
  # Default: exit cleanly after a workflow finishes — releases the port so the next
  # IDE-launched example doesn't hit "port already in use". The run.sh script
  # overrides this to "true" when you run `judge-all` so Studio stays up for inspection.
  studio-keep-alive: ${SWARMAI_STUDIO_ENABLED:false}
  default:
    verbose: ${SWARMAI_DEFAULT_VERBOSE:true}
    max-rpm: ${SWARMAI_DEFAULT_MAX_RPM:15}
    max-execution-time: ${SWARMAI_DEFAULT_MAX_EXECUTION_TIME:600000}
  workflow:
    # Default model identifier — overridden by profile-specific config
    # (application-openai.yml sets this to gpt-4o, application-openai-o3.yml sets it to
    # o3-mini, application-ollama.yml sets it to mistral:latest).
    model: ${SWARMAI_WORKFLOW_MODEL:gpt-4o}
    # Real public APIs that agents can call via http_request.
    # Prevents the LLM from hallucinating API domains.
    known-endpoints:
      - name: GitHub Search Repositories
        url: https://api.github.com/search/repositories?q={query}
        description: Search public GitHub repositories by keyword. Returns JSON with repo metadata, stars, forks.
      - name: Hacker News Algolia Search
        url: https://hn.algolia.com/api/v1/search?query={query}
        description: Search Hacker News stories and comments. Returns JSON with recent tech discussions.
      - name: Wikipedia REST Summary
        url: https://en.wikipedia.org/api/rest_v1/page/summary/{topic}
        description: Get a concise plain-text summary of any Wikipedia topic. Returns JSON with extract and description.
      - name: GitHub Repository Info
        url: https://api.github.com/repos/{topic}
        description: Fetch metadata for a specific GitHub repository (owner/repo format). Returns stars, issues, language.
    scrape-safe-urls:
      - https://en.wikipedia.org/wiki/{topic}
      - https://news.ycombinator.com
  observability:
    enabled: ${SWARMAI_OBSERVABILITY_ENABLED:true}
    structured-logging-enabled: ${SWARMAI_STRUCTURED_LOGGING:true}
    decision-tracing-enabled: ${SWARMAI_DECISION_TRACING:true}
    replay-enabled: ${SWARMAI_REPLAY_ENABLED:true}
    metrics-enabled: ${SWARMAI_METRICS_ENABLED:false}
    tool-tracing-enabled: ${SWARMAI_TOOL_TRACING:true}
  judge:
    # LLM-as-Judge evaluation is OFF by default. It only runs when explicitly enabled, which
    # avoids extra API costs for casual example runs. The `judge-all` regression command
    # passes --swarmai.judge.enabled=true automatically.
    # Enable manually with: --swarmai.judge.enabled=true
    enabled: ${SWARMAI_JUDGE_ENABLED:false}
    provider: ${SWARMAI_JUDGE_PROVIDER:openai}
    model: ${SWARMAI_JUDGE_MODEL:gpt-4o}
    openai-api-key: ${OPENAI_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    workflow-model: ${SWARMAI_WORKFLOW_MODEL:o3-mini}
    output-dir: ${SWARMAI_JUDGE_OUTPUT_DIR:judge-results}
