spring:
  profiles:
    # Default to local Ollama (Mistral 7B). No API keys required — the examples
    # run entirely offline against a local LLM. Switch to --spring.profiles.active=openai
    # for gpt-4o (requires OPENAI_API_KEY) or --spring.profiles.active=openai-o3 for o3-mini.
    active: ${SPRING_PROFILES_ACTIVE:ollama}
  autoconfigure:
    exclude:
      # Vector store + JDBC autoconfigs are always excluded (examples don't use them by default)
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration
      # JDBC + ORM autoconfigs — keep enabled so the H2-backed ledger works.
      # (Re-exclude them in specific examples that need a clean no-DB setup via
      # --spring.autoconfigure.exclude=... on the command line.)
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  # Persistent file-backed H2 for the self-improvement ledger.
  # Lives in ~/.swarmai/examples-ledger.mv.db so the anonymous installationId
  # and daily counters persist across multiple example runs. Flyway migrations
  # V1, V2 (memory + audit from swarmai-core) and V3 (ledger from
  # swarmai-self-improving) run automatically on first boot.
  datasource:
    url: jdbc:h2:file:${user.home}/.swarmai/examples-ledger;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: true
    baseline-on-migrate: true
  ai:
    vectorstore:
      chroma:
        client:
          host: ${CHROMA_HOST:http://localhost}
          port: ${CHROMA_PORT:8000}
        collection-name: ${CHROMA_COLLECTION:swarmai-rag}
        initialize-schema: true

# =============================================================================
# Bridge from .env-style env vars → Spring property names used by framework tools.
#
# Tool classes (e.g. WebSearchTool) use @Value("${stock.search.alphavantage.api-key}")
# but users typically put keys in .env as ALPHA_VANTAGE_API_KEY=...
# These mappings let .env drive the tools without users editing property files.
# Both .env loading (via ParentDirDotenvPostProcessor) and direct env vars work.
# =============================================================================
stock:
  search:
    alphavantage:
      api-key: ${ALPHA_VANTAGE_API_KEY:demo}
    newsapi:
      api-key: ${NEWSAPI_KEY:}
    polygon:
      api-key: ${POLYGON_API_KEY:}
    finnhub:
      api-key: ${FINNHUB_API_KEY:}
    google:
      api-key: ${GOOGLE_API_KEY:}
      search-engine-id: ${GOOGLE_SEARCH_ENGINE_ID:}
    bing:
      api-key: ${BING_API_KEY:}

server:
  # Use a random free port when the Spring Boot web server is started. Prevents
  # "Port 8080 was already in use" when an earlier example still holds 8080 open
  # (e.g. when studio-keep-alive=true). The actual port is printed in the startup log.
  # Override with `--server.port=8080` for a stable Studio URL.
  port: ${SERVER_PORT:0}

swarmai:
  # New-tool showcase bridges — map .env-style names to the Spring properties the
  # tools bind via @Value. The dotenv post-processor installs these as System
  # properties, but Spring won't resolve them without these explicit references.
  tools:
    wolfram:
      app-id: ${WOLFRAM_APPID:}
    openweather:
      api-key: ${OPENWEATHER_API_KEY:}
    jira:
      base-url: ${JIRA_BASE_URL:}
      email: ${JIRA_EMAIL:}
      api-token: ${JIRA_API_TOKEN:}
    pinecone:
      api-key: ${PINECONE_API_KEY:}
      index-host: ${PINECONE_INDEX_HOST:}
    kafka:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:}
    s3:
      region: ${AWS_REGION:}
      endpoint-override: ${AWS_ENDPOINT_URL_S3:}
    image:
      api-key: ${OPENAI_API_KEY:}
  # Exit cleanly after a workflow finishes — releases the port so the next
  # IDE-launched example doesn't hit "port already in use".
  studio-keep-alive: ${SWARMAI_STUDIO_ENABLED:false}
  default:
    verbose: ${SWARMAI_DEFAULT_VERBOSE:true}
    max-rpm: ${SWARMAI_DEFAULT_MAX_RPM:15}
    max-execution-time: ${SWARMAI_DEFAULT_MAX_EXECUTION_TIME:600000}
  workflow:
    # Default model identifier — overridden by profile-specific config.
    # Active profile defaults to ollama → mistral:7b (set in application-ollama.yml).
    model: ${SWARMAI_WORKFLOW_MODEL:mistral:7b}
    # Real public APIs that agents can call via http_request.
    # Prevents the LLM from hallucinating API domains.
    known-endpoints:
      - name: GitHub Search Repositories
        url: https://api.github.com/search/repositories?q={query}
        description: Search public GitHub repositories by keyword. Returns JSON with repo metadata, stars, forks.
      - name: Hacker News Algolia Search
        url: https://hn.algolia.com/api/v1/search?query={query}
        description: Search Hacker News stories and comments. Returns JSON with recent tech discussions.
      - name: Wikipedia REST Summary
        url: https://en.wikipedia.org/api/rest_v1/page/summary/{topic}
        description: Get a concise plain-text summary of any Wikipedia topic. Returns JSON with extract and description.
      - name: GitHub Repository Info
        url: https://api.github.com/repos/{topic}
        description: Fetch metadata for a specific GitHub repository (owner/repo format). Returns stars, issues, language.
    scrape-safe-urls:
      - https://en.wikipedia.org/wiki/{topic}
      - https://news.ycombinator.com
  observability:
    enabled: ${SWARMAI_OBSERVABILITY_ENABLED:true}
    structured-logging-enabled: ${SWARMAI_STRUCTURED_LOGGING:true}
    decision-tracing-enabled: ${SWARMAI_DECISION_TRACING:true}
    replay-enabled: ${SWARMAI_REPLAY_ENABLED:true}
    metrics-enabled: ${SWARMAI_METRICS_ENABLED:false}
    tool-tracing-enabled: ${SWARMAI_TOOL_TRACING:true}
  judge:
    # LLM-as-Judge is DISABLED by default. Examples run free, local-first, and
    # without any API-based evaluation. Leave off unless running regression suites
    # with a cloud provider key.
    enabled: ${SWARMAI_JUDGE_ENABLED:false}
    provider: ${SWARMAI_JUDGE_PROVIDER:openai}
    model: ${SWARMAI_JUDGE_MODEL:gpt-4o}
    openai-api-key: ${OPENAI_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    workflow-model: ${SWARMAI_WORKFLOW_MODEL:mistral:7b}
    output-dir: ${SWARMAI_JUDGE_OUTPUT_DIR:judge-results}

  # Self-improvement: every workflow reserves 10% of its token budget for
  # framework-level analysis. After kickoff() completes, the improvement phase
  # runs and prints a formatted summary of the proposals it produced.
  #
  # Examples use telemetry-mode=PER_WORKFLOW: each example POSTs its rollup to
  # intelliswarm.ai right after the workflow completes. Production services
  # running this framework should override to CONTINUOUS so the cron (every 6h)
  # drives the reporting instead of every single kickoff().
  self-improving:
    enabled: ${SWARMAI_SELF_IMPROVING_ENABLED:true}
    telemetry-enabled: ${SWARMAI_SELF_IMPROVING_TELEMETRY:true}
    telemetry-mode: ${SWARMAI_SELF_IMPROVING_TELEMETRY_MODE:PER_WORKFLOW}
    telemetry-endpoint: ${SWARMAI_TELEMETRY_ENDPOINT:https://intelliswarm.ai}
    telemetry-flush-on-shutdown: true

# Keep example logs readable. Spring Boot 3.x auto-injects a correlation pattern
# (`[traceId spanId]`) that renders as an empty 49-char bracket when no tracing
# context is active — this silences that empty bracket and uses a compact
# ISO timestamp + thread + logger + message layout.
logging:
  pattern:
    correlation: ""
    console: "%d{HH:mm:ss.SSS} %-5level [%15.15t] %-40.40logger{39} : %msg%n"
