# ============================================================================
# Demo-thresholds profile — relaxes rule-extraction bars for local/regression demos
# ============================================================================
# NOT FOR PRODUCTION. These thresholds are deliberately relaxed so you can see
# proposal generation trigger on a small local regression suite. Default
# production thresholds require more cross-workflow evidence than is available
# from a handful of demo runs.
#
# Activate (combined with ollama profile):
#   SPRING_PROFILES_ACTIVE=ollama,demo-thresholds ./run.sh bare-minimum
#
# What changes vs. defaults:
#   - minObservations            : 3  → 1
#   - minCrossWorkflowEvidence   : 2  → 1
#   - tier1MinConfidence         : 0.85 → 0.50
#   - tier2MinConfidence         : 0.70 → 0.40
#   - requireEvidenceForSkills   : true → false
#
# Do not use these values in production.
# ============================================================================
swarmai:
  self-improving:
    tier1-min-confidence: 0.50
    tier2-min-confidence: 0.40
    min-cross-workflow-evidence: 1
    min-observations: 1
    require-evidence-for-skills: false
