services:
  redis:
    image: redis:7-alpine
    container_name: swarmai-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: swarmai-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    container_name: swarmai-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-mistral:7b}"]
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: swarmai-app
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL=${OLLAMA_MODEL:-mistral:7b}
      - SPRING_DATA_REDIS_HOST=redis
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
      - SERP_API_KEY=${SERP_API_KEY:-}
      - WORKFLOW=${WORKFLOW:-stock-analysis}
      - WORKFLOW_ARGS=${WORKFLOW_ARGS:-AAPL}
    volumes:
      - ./output:/app/output

volumes:
  ollama_data:
