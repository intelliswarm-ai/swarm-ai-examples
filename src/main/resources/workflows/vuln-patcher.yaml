# SwarmAI Vulnerability Patcher — Self-Improving Edition
#
# Uses SELF_IMPROVING process: when the Security Engineer can't fix a
# vulnerability type, the framework dynamically generates a new Groovy
# skill (e.g., a dependency version resolver), validates it in a sandbox,
# and hot-loads it into the agent mid-run.
#
# The RL policy engine decides when to generate skills vs retry vs converge.
# Skills persist to output/skills/ and are reused across future scans.
#
# Comparison to original (Quarkus+LangChain4j):
#   Original: Fixed 3-pass consensus, no learning, no budget, no governance
#   SwarmAI:  Self-improving loop, RL decisions, $10 budget cap, approval gate

swarm:
  name: "Self-Improving Vulnerability Patcher"
  process: SELF_IMPROVING

  budget:
    maxTokens: 500000
    maxCostUsd: 10.00
    onExceeded: HARD_STOP
    warningThresholdPercent: 80

  governance:
    approvalGates:
      - name: "Security Review Gate"
        description: "Security expert must approve patches before completion"
        trigger: ON_ITERATION_COMPLETE
        timeoutMinutes: 5
        policy:
          requiredApprovals: 1
          autoApproveOnTimeout: true

  agents:
    scanner:
      role: "Vulnerability Scanner"
      goal: >
        Scan the given repository for known security vulnerabilities.
        Check dependencies against CVE and OSV databases.
        Report each vulnerability with CVE ID, severity, CVSS score,
        affected dependency, and recommended fix version.
      backstory: >
        Senior security engineer specialized in software composition analysis.
        Systematically checks every dependency. Never fabricates CVEs.
      tools: [cve_lookup, osv_lookup, file_read, directory_read]
      temperature: 0.1
      permissionMode: READ_ONLY

    engineer:
      role: "Security Patch Engineer"
      goal: >
        Generate minimal, secure patches for each identified vulnerability.
        Prefer version bumps over code rewrites. If you lack the capability
        to fix a specific CVE type, describe exactly what skill you need.
      backstory: >
        Staff security engineer who writes precise, backward-compatible fixes.
        When encountering unknown vulnerability types, clearly states what
        tool or skill is missing so the system can generate it.
      tools: [file_read, file_write, code_execution]
      temperature: 0.3
      permissionMode: WORKSPACE_WRITE
      memory: true

    reviewer:
      role: "Security Expert Reviewer"
      goal: >
        Review all patches. Respond with:
        - APPROVED if all fixes are correct
        - CAPABILITY_GAPS if engineer needs new skills to fix certain CVEs
        - NEEDS_REFINEMENT if fixes have quality issues
      backstory: >
        CISO-level reviewer. Distinguishes between quality issues (refinement)
        and capability gaps (need new skills). Meticulous and conservative.
      tools: [file_read, cve_lookup]
      temperature: 0.2
      permissionMode: READ_ONLY
      maxTurns: 3

  tasks:
    scan:
      description: >
        Scan repository at {{repo_url}} for security vulnerabilities.
        1. Read dependency files (pom.xml, package.json, requirements.txt)
        2. Look up each dependency in CVE and OSV databases
        3. Report: CVE ID, severity, CVSS, affected dependency, fix version
      expectedOutput: "Vulnerability report sorted by severity"
      agent: scanner
      outputFormat: MARKDOWN

    fix:
      description: >
        Generate patches for all CRITICAL and HIGH severity vulnerabilities.
        For dependency issues, update version. For code issues, rewrite.
        If you CANNOT fix a CVE type, describe what capability is missing.
      expectedOutput: "Patched files with explanations, or capability gap descriptions"
      agent: engineer
      dependsOn: [scan]
      outputFormat: MARKDOWN
