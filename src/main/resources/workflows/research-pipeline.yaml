##
# Research Pipeline — YAML DSL Example
#
# This workflow demonstrates how a multi-agent research pipeline
# can be defined declaratively in YAML instead of 60+ lines of Java.
#
# Template variables ({{topic}}, {{outputDir}}) are substituted at load time.
##

swarm:
  name: "Research Pipeline"
  process: SEQUENTIAL
  verbose: true
  language: en

  budget:
    maxTokens: 100000
    maxCostUsd: 5.0
    onExceeded: WARN
    warningThresholdPercent: 80.0

  agents:
    researcher:
      role: "Senior Research Analyst"
      goal: "Gather comprehensive, accurate information on {{topic}}"
      backstory: >
        You are a seasoned research analyst with 15 years of experience.
        You excel at finding reliable sources, cross-referencing data,
        and identifying key trends and patterns.
      maxTurns: 3
      temperature: 0.7

    analyst:
      role: "Data Analyst"
      goal: "Analyze research findings and extract actionable insights"
      backstory: >
        You are a data analyst who specializes in turning raw research
        into structured insights. You use statistical thinking and
        critical analysis to validate findings.
      temperature: 0.3

    writer:
      role: "Technical Writer"
      goal: "Produce a clear, well-structured final report"
      backstory: >
        You are a technical writer who creates polished, readable reports.
        You organize information logically and highlight key takeaways
        for executive audiences.
      temperature: 0.5

  tasks:
    gather:
      description: >
        Research the topic "{{topic}}" thoroughly.
        Find at least 5 key data points, trends, or findings.
        Include sources where possible.
      expectedOutput: "A comprehensive research summary with sourced data points"
      agent: researcher

    analyze:
      description: >
        Analyze the research findings from the previous step.
        Identify the top 3 insights, any contradictions in the data,
        and areas that need further investigation.
      expectedOutput: "A structured analysis with ranked insights and confidence levels"
      agent: analyst
      dependsOn:
        - gather

    report:
      description: >
        Write a final executive report synthesizing the research and analysis.
        Structure it with: Executive Summary, Key Findings, Detailed Analysis,
        and Recommendations.
      expectedOutput: "A polished executive report in markdown format"
      agent: writer
      dependsOn:
        - analyze
      outputFormat: MARKDOWN
      outputFile: "{{outputDir}}/research-report.md"
